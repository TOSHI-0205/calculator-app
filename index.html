<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d3238">
  <meta name="format-detection" content="telephone=no">
  <title>電卓</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calc" role="application" aria-label="電卓">
    <div class="display-wrap">
      <div class="display-sub" id="subDisplay" aria-hidden="true"></div>
      <div class="display-main" id="mainDisplay" aria-live="polite" aria-atomic="true">0</div>
    </div>

    <div class="calc-pad" id="calcPad">
    <div class="keys-tax" role="group" aria-label="消費税（税込表示）">
      <button type="button" class="key key-tax8" data-action="tax" data-rate="8" aria-label="消費税8%の税込価格を表示">８％</button>
      <button type="button" class="key key-tax10" data-action="tax" data-rate="10" aria-label="消費税10%の税込価格を表示">１０％</button>
    </div>

    <div class="keys" id="keypad">
      <button type="button" class="key key-fn" data-action="clear" aria-label="オールクリア">AC</button>
      <button type="button" class="key key-fn" data-action="sign" aria-label="符号反転">±</button>
      <button type="button" class="key key-fn" data-action="percent" aria-label="パーセント">％</button>
      <button type="button" class="key key-op" data-op="/" aria-label="割る">÷</button>

      <button type="button" class="key key-num" data-digit="7">7</button>
      <button type="button" class="key key-num" data-digit="8">8</button>
      <button type="button" class="key key-num" data-digit="9">9</button>
      <button type="button" class="key key-op" data-op="*" aria-label="掛ける">×</button>

      <button type="button" class="key key-num" data-digit="4">4</button>
      <button type="button" class="key key-num" data-digit="5">5</button>
      <button type="button" class="key key-num" data-digit="6">6</button>
      <button type="button" class="key key-op" data-op="-" aria-label="引く">−</button>

      <button type="button" class="key key-num" data-digit="1">1</button>
      <button type="button" class="key key-num" data-digit="2">2</button>
      <button type="button" class="key key-num" data-digit="3">3</button>
      <button type="button" class="key key-op" data-op="+" aria-label="足す">＋</button>

      <button type="button" class="key key-num key-zero" data-digit="0">0</button>
      <button type="button" class="key key-num" data-action="dot">.</button>
      <button type="button" class="key key-op" data-action="equals" aria-label="計算結果">＝</button>
    </div>
    </div>

    <p class="hint">税込ボタンは表示中の金額を税抜きとして税込みを表示します。四則演算は左から順に計算します。</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
